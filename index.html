<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>微信对话模拟 (安全版)</title>
    <style>
        /* 全局基础：模拟手机大背景 */
        body { background-color: #ededed; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 手机容器：像图 4 一样有圆角和阴影 */
        #phone { width: 100%; max-width: 375px; height: 100vh; background: #f3f3f3; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.15); border-radius: 20px; overflow: hidden; }
        @media (max-width: 414px) { #phone { border-radius: 0; } } /* 在真手机上全屏 */

        /* 1. 顶部状态栏：高仿图 4 效果 */
        .status-bar { height: 44px; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; color: #000; font-size: 14px; position: absolute; top: 0; width: 100%; box-sizing: border-box; z-index: 10; font-weight: 500;}
        .dynamic-island { width: 120px; height: 25px; background: #000; border-radius: 12.5px; position: absolute; left: 50%; transform: translateX(-50%); top: 8px; } /* 模拟灵动岛 */
        .status-left, .status-right { display: flex; align-items: center; gap: 4px; }
        .battery { width: 22px; height: 11px; border: 1px solid #000; border-radius: 2px; position: relative; padding: 1px; }
        .battery::after { content: ""; width: 80%; height: 100%; background: #000; display: block; }
        .battery::before { content: ""; width: 2px; height: 4px; background: #000; position: absolute; right: -3px; top: 3px; border-radius: 0 1px 1px 0; }

        /* 2. 微信导航栏 */
        .header { background: #ededed; color: #000; padding: 50px 15px 10px; text-align: center; font-size: 17px; font-weight: 600; border-bottom: 1px solid #dbdbdb; position: relative; z-index: 5; }
        .header::before { content: "‹"; position: absolute; left: 15px; bottom: 8px; font-size: 26px; color: #000; }

        /* 3. 聊天区域 */
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: #ededed; padding-bottom: 70px; }

        /* 通用消息结构 */
        .msg-row { display: flex; margin-bottom: 18px; width: 100%; align-items: flex-start;}
        .msg { max-width: 70%; padding: 10px 12px; border-radius: 6px; font-size: 15.5px; line-height: 1.5; position: relative; word-wrap: break-word; }

        /* AI 消息 (左侧白色) */
        .ai-row { justify-content: flex-start; }
        .ai-msg { background: #ffffff; color: #000; margin-left: 10px; }
        .ai-msg::before { content: ""; position: absolute; left: -10px; top: 12px; border: 5px solid transparent; border-right-color: #ffffff; }

        /* 用户消息 (右侧绿色) */
        .user-row { justify-content: flex-end; }
        .user-msg { background: #95ec69; color: #000; margin-right: 10px; }
        .user-msg::after { content: ""; position: absolute; right: -10px; top: 12px; border: 5px solid transparent; border-left-color: #95ec69; }

        /* 4. 底部输入框 */
        .footer { background: #f7f7f7; padding: 10px 15px; display: flex; align-items: center; border-top: 1px solid #dbdbdb; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 5; }
        input { flex: 1; border: none; padding: 10px 14px; border-radius: 6px; font-size: 16px; outline: none; background: #ffffff; }
        button { background: #07c160; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 4px; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 15px;}
        button:disabled { background: #e1e1e1; color: #b1b1b1; }
    </style>
</head>
<body>

<div id="phone">
    <div class="status-bar">
        <div class="status-left">13:55</div>
        <div class="dynamic-island"></div>
        <div class="status-right">
            <span>5G</span>
            <div class="battery"></div>
        </div>
    </div>

    <div class="header">DeepSeek 助手</div>

    <div id="chat">
        <div class="msg-row ai-row">
            <div class="msg ai-msg">你好！为了账号安全，请先在下方输入 API Key，然后我就能帮你回答了。</div>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="userInput" placeholder="请输入消息...">
        <button id="sendBtn" onclick="handleSend()">发送</button>
    </div>
</div>

<script>
    // 【关键安全设计】
    // 代码里绝不写死 Key！
    let API_KEY = ""; 

    // 页面加载后立即弹窗管你要 Key
    window.onload = function() {
        API_KEY = prompt("🔐 请输入你的 DeepSeek API Key (仅保存在当前浏览器内存，公开代码 100% 安全)：");
        if (API_KEY) {
            addMessage("成功接通 API，可以开始对话了！", 'ai');
        } else {
            addMessage("⚠️ 没有输入 Key，对话将无法进行哦。", 'ai');
        }
    };

    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    async function handleSend() {
        if (!API_KEY) {
            alert("请先刷新页面并输入 API Key 吧！");
            return;
        }

        const text = input.value.trim();
        if (!text) return;

        // 1. 添加用户消息到界面
        addMessage(text, 'user');
        input.value = '';
        btn.disabled = true;

        try {
            // 2. 调用 DeepSeek API
            const response = await fetch("https://api.deepseek.com/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat", 
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            // 3. 添加 AI 消息到界面
            addMessage(aiReply, 'ai');
        } catch (error) {
            addMessage("😥 哎呀，API 连接出错了，检查一下 Key 吧！", 'ai');
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }

    function addMessage(text, role) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}-row`;
        
        const msg = document.createElement('div');
        msg.className = `msg ${role}-msg`;
        msg.textContent = text;
        
        row.appendChild(msg);
        chatDiv.appendChild(row);
        chatDiv.scrollTop = chatDiv.scrollHeight; // 自动到底部
    }

    // 回车发送
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
</script>

</body>
</html>
        }
    </style>
</head>
<body>

    <div id="phone-container">
        <div class="header">🤖 我的AI助手</div>
        
        <div id="chat">
            <div class="msg ai">你好！我是你的AI助手。你想聊点什么？</div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="按回车或点发送...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            const message = input.value.trim();
            
            if (!message) return; // 如果是空的就不发送

            // 显示用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.textContent = message;
            chat.appendChild(userMsg);
            
            input.value = '';
            chat.scrollTop = chat.scrollHeight; // 自动滚到底部
            
            // 模拟AI回复
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                aiMsg.textContent = '我已经收到你的消息了！现在需要设置后端 API 才能真的对话。';
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }
        
        // 按回车发送
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
