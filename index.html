<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI助手</title>
    <style>
        /* 1. 整体背景：让页面看起来更现代 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. 模拟手机容器：给网页一个边框和阴影 */
        #phone-container {
            width: 100%;
            max-width: 375px; /* 模拟 iPhone 宽度 */
            height: 90vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid #333; /* 模拟手机黑边 */
        }

        /* 顶部标题栏 */
        .header {
            background: #007AFF;
            color: white;
            padding: 20px 15px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* 3. 对话展示区域：增加滚动条美化 */
        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9f9f9;
        }

        /* 4. 气泡样式优化 */
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .ai {
            background-color: #e9e9eb;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background-color: #007AFF;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 5. 底部输入框：像微信一样横向排列 */
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="phone-container">
        <div class="header">🤖 我的AI助手</div>
        
        <div id="chat">
            <div class="msg ai">你好！我是你的AI助手。你想聊点什么？</div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="按回车或点发送...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            const message = input.value.trim();
            
            if (!message) return; // 如果是空的就不发送

            // 显示用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.textContent = message;
            chat.appendChild(userMsg);
            
            input.value = '';
            chat.scrollTop = chat.scrollHeight; // 自动滚到底部
            
            // 模拟AI回复
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                aiMsg.textContent = '我已经收到你的消息了！现在需要设置后端 API 才能真的对话。';
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }
        
        // 按回车发送
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
