<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Juemeng's WebOS</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }
        
        #phone-container {
            width: 100vw; height: 100%; max-width: 450px; margin: 0 auto;
            position: relative; background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1000') center/cover;
            display: flex; flex-direction: column;
        }

        /* 顶部云朵时间 */
        .status-bar { padding: 40px 20px 20px; text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        #time { font-size: 50px; font-weight: 200; }
        #date { font-size: 16px; opacity: 0.8; }

        /* 桌面图标网格 */
        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; padding: 20px;
            flex: 1; align-content: start;
        }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-box { 
            width: 60px; height: 60px; border-radius: 14px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }
        .app-label { color: white; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* App 窗口层 */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ededed; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; display: flex; flex-direction: column;
        }
        .app-window.active { transform: translateY(0); }
        
        /* 虚拟返回键 */
        .home-indicator {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 5px; background: rgba(255,255,255,0.5); border-radius: 5px;
            z-index: 1000; cursor: pointer;
        }
        .app-window .home-indicator { background: rgba(0,0,0,0.2); }

        /* 聊天界面简易样式 */
        .app-header { padding: 15px; background: #f7f7f7; text-align: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        .chat-content { flex: 1; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="phone-container">
    <div class="status-bar">
        <div id="time">00:00</div>
        <div id="date">3月18日 星期三</div>
    </div>

    <div class="app-grid">
        <div class="app-icon" onclick="openApp('wechat')">
            <div class="icon-box" style="background: #07c160;">💬</div>
            <div class="app-label">微信</div>
        </div>
        <div class="app-icon" onclick="openApp('qq')">
            <div class="icon-box" style="background: #12b7f5;">🐧</div>
            <div class="app-label">QQ</div>
        </div>
        <div class="app-icon" onclick="openApp('settings')">
            <div class="icon-box" style="background: #95a5a6;">⚙️</div>
            <div class="app-label">设置</div>
        </div>
    </div>

    <div id="wechat" class="app-window">
        <div class="app-header">樊祝知</div>
        <div class="chat-content">
            <p style="color:#888; text-align:center; font-size:12px;">这里就是你之前玩的聊天界面...</p>
        </div>
        <div class="home-indicator" onclick="closeApp()"></div>
    </div>

    <div id="settings" class="app-window" style="background: #fff;">
        <div class="app-header">系统设置</div>
        <div style="padding: 20px;">
            <label>API Key (DeepSeek):</label>
            <input type="password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <button style="width:100%; padding:10px; background:#07c160; color:white; border:none; border-radius:5px;">保存配置</button>
        </div>
        <div class="home-indicator" onclick="closeApp()"></div>
    </div>

    <div class="home-indicator" onclick="closeApp()"></div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('time').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000);
    updateTime();

    function openApp(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeApp() {
        document.querySelectorAll('.app-window').forEach(win => win.classList.remove('active'));
    }
</script>

</body>
</html>
