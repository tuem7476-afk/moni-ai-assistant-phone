<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的 AI 助手</title>
    <style>
        /* 核心修复：锁定屏幕，不许乱跑 */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #ededed; }
        
        /* 手机容器 */
        #phone { 
            display: flex; flex-direction: column; 
            width: 100vw; height: 100%; 
            max-width: 450px; margin: 0 auto; 
            background: #f3f3f3; position: relative;
        }

        /* 顶部装饰栏 */
        .status-bar { height: 40px; display: flex; justify-content: center; align-items: center; background: #ededed; }
        .island { width: 100px; height: 24px; background: #000; border-radius: 12px; }

        /* 标题栏 */
        .header { padding: 10px; text-align: center; font-weight: bold; border-bottom: 1px solid #ddd; background: #ededed; }

        /* 聊天区域 */
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* 气泡样式 */
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .ai { align-self: flex-start; background: #fff; color: #000; }
        .user { align-self: flex-end; background: #95ec69; color: #000; }

        /* 底部输入框：解决遮挡关键 */
        .footer { 
            padding: 10px; background: #f7f7f7; border-top: 1px solid #ddd;
            display: flex; gap: 8px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
        }
        input { flex: 1; border: none; padding: 10px; border-radius: 4px; font-size: 16px; outline: none; }
        button { background: #07c160; color: white; border: none; padding: 0 15px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="phone">
    <div class="status-bar"><div class="island"></div></div>
    <div class="header">DeepSeek 助手</div>
    <div id="chat">
        <div class="msg ai">请先输入 API Key 开启对话。</div>
    </div>
    <div class="footer">
        <input type="text" id="userInput" placeholder="输入消息...">
        <button onclick="handleSend()">发送</button>
    </div>
</div>

<script>
    let API_KEY = "";
    window.onload = function() {
        API_KEY = prompt("🔐 请输入你的 DeepSeek API Key：");
    };

    async function handleSend() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        // 添加用户消息
        addMsg(text, 'user');
        input.value = '';

        try {
            const res = await fetch("https://api.deepseek.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [{role: "user", content: text}] })
            });
            const data = await res.json();
            addMsg(data.choices[0].message.content, 'ai');
        } catch (e) {
            addMsg("连接失败，请检查 Key。", 'ai');
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }
</script>

</body>
</html>
